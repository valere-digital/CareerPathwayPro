<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career Pathway Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#e7edf3;font-family:'Inter',system-ui,sans-serif;color:#172230}
  .cpp-scroll::-webkit-scrollbar{width:0;display:none}
  .cpp-scroll{scrollbar-width:none}
  @keyframes bluPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.12);opacity:1}}
  @keyframes bluDot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .fade{animation:fadeUp .32s ease both}
  input,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px 12px;font-family:'Inter',sans-serif">
<div style="width:402px;max-width:100%;height:848px;background:#FBFCFD;border-radius:24px;position:relative;overflow:hidden;box-shadow:0 24px 70px rgba(23,34,48,.28),0 0 0 1px rgba(23,34,48,.08);display:flex;flex-direction:column">

  <!-- ============ MOBILE BROWSER CHROME ============ -->
  <div id="cpp-browserchrome" style="flex:none;background:#eceff3;border-bottom:1px solid #dde3ea;overflow:hidden;transition:height .28s ease">
    <div id="cpp-urlbar" style="height:52px;transition:opacity .22s ease,height .28s ease;display:flex;align-items:center;gap:8px;padding:0 12px">
      <div style="display:flex;gap:14px;color:#8a96a5"><i data-lucide="chevron-left" width="19" height="19" style="color:#b6c0cc"></i><i data-lucide="chevron-right" width="19" height="19" style="color:#b6c0cc"></i></div>
      <div style="flex:1;height:34px;background:#fff;border-radius:11px;display:flex;align-items:center;gap:7px;padding:0 12px;box-shadow:inset 0 0 0 1px #e2e7ee">
        <i data-lucide="lock" width="13" height="13" style="color:#2ea86a"></i>
        <span style="font-size:13px;color:#3d4a5c;font-weight:500">careerpathwaypro.org</span>
        <i data-lucide="rotate-cw" width="14" height="14" style="color:#8a96a5;margin-left:auto"></i>
      </div>
      <i data-lucide="ellipsis-vertical" width="19" height="19" style="color:#8a96a5"></i>
    </div>
  </div>

  <!-- ============ TOP BAR ============ -->
  <div id="cpp-topbar" style="flex:none"></div>

  <!-- ============ SCROLLABLE BODY ============ -->
  <div class="cpp-scroll" id="cpp-body" style="flex:1;overflow-y:auto;position:relative"></div>

  <!-- ============ BOTTOM NAV ============ -->
  <div id="cpp-nav" style="flex:none"></div>

  <!-- ============ OVERLAYS ============ -->
  <div id="cpp-fab"></div>
  <div id="cpp-chat"></div>
  <div id="cpp-modal"></div>

</div>
</div>

// intake
APP.startIntake = function(){
  if(!state.consented) return;
  setState({ screen:'intake', intakeStep:0, draftChips:[], intakeLog:[{isBlu:true, text:intakeQuestions[0].blu}] });
};
function advanceIntake(userText){
  var next = state.intakeStep + 1;
  var add = [{ isUser:true, text:userText }];
  if(next < intakeQuestions.length){
    add.push({ isBlu:true, text:intakeQuestions[next].blu });
    setState({ intakeStep:next, draftChips:[], intakeLog:state.intakeLog.concat(add) });
  } else {
    setState({ intakeLog:state.intakeLog.concat(add), screen:'generating' });
    setTimeout(function(){ if(state.screen==='generating') setState({ screen:'pathways' }); }, 3200);
  }
}
APP.submitZip = function(){ var el=document.getElementById('zipInput'); var v=(el&&el.value.trim())||'38501'; advanceIntake('My ZIP is '+v); };

APP.openChat = function(){ setState({ chatOpen:true, chatMessages: state.chatMessages.length? state.chatMessages : [{isBlu:true, text:"Hey Alex! I'm here whenever you need me. Ask me anything about your pathway, programs, or next steps."}] }); };
APP.closeChat = function(){ setState({ chatOpen:false }); };
function bluReply(q){
  var t=q.toLowerCase();
  if(t.indexOf('demand')>-1||t.indexOf('near')>-1) return "Medical Assistant roles are in high demand across Putnam County — I'm seeing steady openings at regional clinics. Want me to show local programs?";
  if(t.indexOf('training')>-1||t.indexOf('program')>-1||t.indexOf('need')>-1) return "For Medical Assistant you'd want the TCAT Medical Assisting Certificate (11 mo) plus an EHR micro-credential to close your skills gap. Both may be WIOA-funded.";
  if(t.indexOf('fund')>-1||t.indexOf('pay')>-1||t.indexOf('cost')>-1) return "Many programs here are WIOA-eligible or grant funded. I can't confirm formal eligibility — that's done with your AJC advisor — but I can point you to the right person.";
  if(t.indexOf('resume')>-1) return "I can build your resume with you in about 8 minutes, section by section. Head to Career Tools whenever you're ready!";
  return "Great question! I keep things focused on careers, training, and support near you. Want me to recommend your next step?";
}
function pushChat(text){
  var reply=bluReply(text);
  setState({ chatMessages:state.chatMessages.concat([{isUser:true,text:text}]) });
  setTimeout(function(){ setState({ chatMessages:state.chatMessages.concat([{isBlu:true,text:reply}]) }); scrollChat(); }, 500);
  scrollChat();
}
function scrollChat(){ var c=document.getElementById('chatScroll'); if(c) c.scrollTop=c.scrollHeight; }
APP.sendQuick = function(e,el){ pushChat(el.dataset.val); };
APP.sendChat = function(){ var el=document.getElementById('chatInput'); var v=(el&&el.value.trim()); if(!v) return; el.value=''; pushChat(v); };

function computed(){
  var st=state, screen=st.screen;
  var onboarding = ['splash','language','auth','verify','consent','intake','generating'];

  var progSaved = st.savedProgramIds.indexOf(st.selectedProgramId)>-1;

  // milestones

  ];

    circleBg: m.done?'#2ea86a':(m.current?'#fff6ec':'#f3f6fa'),
    circleBorder: m.done?'#2ea86a':(m.current?'#f5a623':'#e3e9f0'),

    markColor: m.done?'#fff':(m.current?'#f5a623':'#c8d2dc'),

    status: m.done?'Done':(m.current?'Up next':'Locked'),
    statusColor: m.done?'#2ea86a':(m.current?'#f5a623':'#c8d2dc')
  }; });
  var done=mdefs.filter(function(m){return m.done;}).length; var pct=Math.round(done/mdefs.length*100);

  // badges
  var bdefs=[
    {label:'First Step', icon:'footprints', hint:'Completed intake', earned:true, color:'#00897B'},
    {label:'Pathfinder', icon:'route', hint:'Selected a pathway', earned:true, color:'#294A95'},
    {label:'Planner', icon:'bookmark-check', hint:'Saved a program', earned:true, color:'#C6202C'},
    {label:'Resume Ready', icon:'file-check', hint:'Built your resume', earned:false, color:'#9aa7b6'},
    {label:'Interview Ace', icon:'mic', hint:'Finished mock interview', earned:false, color:'#9aa7b6'},
    {label:'Connected', icon:'handshake', hint:'Referred to AJC', earned:false, color:'#9aa7b6'}
  ];

    tag: b.earned?'Earned':'Locked', tagColor: b.earned?'#1e9159':'#9aa7b6', tagBg: b.earned?'#eafaf1':'#f3f6fa' }; }

    {label:'Email', value:'alex.morgan@email.com'},
    {label:'Phone', value:'(931) 555-4821'},
    {label:'ZIP code', value:'38501 · Putnam County'}

    editFields:editFields, profileSaved:st.profileSaved,

    esBorder: st.lang==='es'?'#294A95':'#eef2f6', esBg: st.lang==='es'?'#eef3fb':'#fff',

// =================== RENDER ===================
function refreshIcons(){ if(window.lucide){ try{ window.lucide.createIcons(); }catch(e){} } }

function bindScroll(){
  var sc = document.getElementById('cpp-body');
  if(sc && !sc._urlBound){
    sc._urlBound = true;
    sc.addEventListener('scroll', function(){
      var chrome = document.getElementById('cpp-browserchrome');
      var bar = document.getElementById('cpp-urlbar');
      if(!chrome || !bar) return;
      if(sc.scrollTop > 14){ chrome.style.height='0px'; bar.style.opacity='0'; }
      else { chrome.style.height='53px'; bar.style.opacity='1'; }
    }, { passive:true });
  }
}

function render(){
  var V = computed();
  var body = (S[V.screen] || S.splash)(V);
  document.getElementById('cpp-topbar').innerHTML = topbarHtml(V);
  document.getElementById('cpp-body').innerHTML = body;
  document.getElementById('cpp-nav').innerHTML = navHtml(V);
  document.getElementById('cpp-fab').innerHTML = fabHtml(V);
  document.getElementById('cpp-chat').innerHTML = chatHtml(V);
  document.getElementById('cpp-modal').innerHTML = modalHtml(V);
  refreshIcons();
  bindScroll();
  scrollChat();
}

// generating animation + lucide load retry
var _gi = setInterval(function(){ if(state.screen==='generating') render(); }, 700);
var _tries=0;
var _li = setInterval(function(){ _tries++; refreshIcons(); if(window.lucide || _tries>40) clearInterval(_li); }, 120);

render();
})();
